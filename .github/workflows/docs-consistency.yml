name: Docs Consistency

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate docs references
        run: python3 scripts/docs_consistency_check.py
