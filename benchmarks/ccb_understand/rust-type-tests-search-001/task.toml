version = "1.0"

[metadata]
name = "rust-type-tests-search-001"
description = "Find a function in rust-lang/rust (2M+ LOC) from a behavioral description"
difficulty = "hard"
category = "semantic-code-navigation"
tags = ["ccb_understand", "rust", "sr-qa", "large-repo", "repoqa"]
language = "rust"

[task]
id = "rust-type-tests-search-001"
repo = "rust-lang/rust"
category = "ccb_understand"
language = "rust"
difficulty = "hard"
time_limit_sec = 1200

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "semantic_similarity"
description = "Correct function retrieval similarity score"

[environment]
build_timeout_sec = 1800.0
cpus = 2
memory = "4G"
storage = "10G"

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'MCPEOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
MCPEOF
  echo "MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
