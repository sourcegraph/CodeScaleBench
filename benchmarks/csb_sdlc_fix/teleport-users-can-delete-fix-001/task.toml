version = "1.0"

[metadata]
name = "teleport-users-can-delete-fix-001"
description = "## Title: Users can delete their only MFA device when multi factor authentication is required "
license = "MIT"

[task]
id = "teleport-users-can-delete-fix-001"
repo = "gravitational/teleport"
category = "bug_fix"
language = "go"
pre_fix_rev = "4b11dc4a8e02ec5620b27f9ecb28f3180a5e67f7"
difficulty = "hard"
time_limit_sec = 900

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "test_ratio"
description = "SWE-bench Pro test verification with partial credit"

[resources]
memory_mb = 8192

[environment]
build_timeout_sec = 900.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'EOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
EOF
  echo "OK MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
