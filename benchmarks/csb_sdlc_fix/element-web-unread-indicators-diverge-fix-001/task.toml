description = "'# Unread indicators diverge between room and thread timelines\n\n## Description:\nWhen navigating a room with threads, “unread” indicators do not always respect thread-scoped read receipts nor the ru"
license = "MIT"

[task]
id = "element-web-unread-indicators-diverge-fix-001"
repo = "element-hq/element-web"
category = "bug_fix"
language = "typescript"
pre_fix_rev = "526645c79160ab1ad4b4c3845de27d51263a405e"
difficulty = "hard"
