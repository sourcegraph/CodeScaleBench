version = "1.0"

[metadata]
name = "docgen-runbook-001"
description = "Generate an operational runbook for Prometheus TSDB compaction covering monitoring, failure modes, and recovery"
license = "Apache-2.0"

[task]
id = "docgen-runbook-001"
repo = "prometheus/prometheus"
category = "runbook_writing"
language = "go"
difficulty = "hard"
time_limit_sec = 1800

[task.metadata]
complexity_dimension = "documentation_reasoning"
doc_type = "operational_runbook"
target_module = "tsdb/compact.go,tsdb/head.go,tsdb/db.go"
output_path = "/workspace/documentation.md"

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "checklist"
description = "Weighted checklist: monitoring indicator accuracy (0.30) + failure mode coverage (0.30) + recovery procedure correctness (0.20) + code reference accuracy (0.20)"

[environment]
build_timeout_sec = 900.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'MCPEOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
MCPEOF
  echo "OK MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
