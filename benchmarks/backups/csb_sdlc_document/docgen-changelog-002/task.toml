version = "1.0"

[metadata]
name = "docgen-changelog-002"
description = "Generate release notes for Flipt summarizing API changes, breaking changes, and new features"
license = "GPL-3.0"

[task]
id = "docgen-changelog-002"
repo = "flipt-io/flipt"
category = "changelog_generation"
language = "go"
difficulty = "hard"
time_limit_sec = 1200

[task.metadata]
complexity_dimension = "documentation_reasoning"
doc_type = "release_notes"
target_module = "rpc/flipt/,internal/server/,internal/storage/"
output_path = "/workspace/RELEASE_NOTES.md"

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "checklist"
description = "Weighted checklist: breaking change identification (0.40) + deprecation detection (0.30) + new feature listing (0.30)"

[environment]
build_timeout_sec = 900.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'MCPEOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
MCPEOF
  echo "OK MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
