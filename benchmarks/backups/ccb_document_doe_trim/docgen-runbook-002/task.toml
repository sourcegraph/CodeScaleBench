version = "1.0"

[metadata]
name = "docgen-runbook-002"
description = "Generate a troubleshooting runbook for Envoy's connection pool management covering failure scenarios and configuration fixes"
license = "Apache-2.0"

[task]
id = "docgen-runbook-002"
repo = "envoyproxy/envoy"
category = "runbook_writing"
language = "cpp"
difficulty = "hard"
time_limit_sec = 1800

[task.metadata]
complexity_dimension = "documentation_reasoning"
doc_type = "troubleshooting_runbook"
target_module = "source/common/http/conn_pool_base.cc,source/common/tcp/conn_pool.cc"
output_path = "/workspace/documentation.md"

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "checklist"
description = "Weighted checklist: failure scenario accuracy (0.30) + diagnostic command correctness (0.30) + configuration fix validity (0.20) + code reference accuracy (0.20)"

[environment]
build_timeout_sec = 900.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'MCPEOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
MCPEOF
  echo "OK MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
