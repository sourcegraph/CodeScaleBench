version = "1.0"

[metadata]
name = "docgen-inline-001"
description = "Generate comprehensive Python docstrings for Django's undocumented cache middleware module"
license = "BSD-3-Clause"

[task]
id = "docgen-inline-001"
repo = "django/django"
category = "inline_docstring_generation"
language = "python"
difficulty = "hard"
time_limit_sec = 1200

[task.metadata]
complexity_dimension = "documentation_reasoning"
doc_type = "inline_docstrings"
target_module = "django/middleware/cache.py"
output_path = "/workspace/documentation.md"

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "checklist"
description = "Weighted checklist: docstring presence (0.30) + parameter documentation (0.30) + example correctness (0.20) + style compliance (0.20)"

[environment]
build_timeout_sec = 900.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'MCPEOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
MCPEOF
  echo "OK MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
