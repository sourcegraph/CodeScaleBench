version = "1.0"

[metadata]
name = "docgen-onboard-001"
description = "Generate a developer onboarding guide for Istio's control plane covering build, architecture, and contribution workflow"
license = "Apache-2.0"

[task]
id = "docgen-onboard-001"
repo = "istio/istio"
category = "onboarding_guide"
language = "go"
difficulty = "hard"
time_limit_sec = 1800

[task.metadata]
complexity_dimension = "documentation_reasoning"
doc_type = "onboarding_guide"
target_module = "pilot/pkg/,security/pkg/,galley/pkg/"
output_path = "/workspace/documentation.md"

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "checklist"
description = "Weighted checklist: prerequisite accuracy (0.30) + architecture correctness (0.30) + workflow completeness (0.20) + code reference accuracy (0.20)"

[environment]
build_timeout_sec = 900.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'MCPEOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
MCPEOF
  echo "OK MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
