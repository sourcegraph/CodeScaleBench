version = "1.0"

[metadata]
name = "test-integration-002"
description = "Write integration tests for Navidrome's media scanning pipeline"
license = "GPL-3.0"

[task]
id = "test-integration-002"
repo = "navidrome/navidrome"
category = "integration-test-authoring"
language = "go"
difficulty = "hard"
time_limit_sec = 1800

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "checklist"
description = "Weighted checklist: test file presence (0.20) + pipeline stage coverage (0.40) + fixture usage (0.25) + test function count (0.15)"

[environment]
build_timeout_sec = 1800.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'EOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
EOF
fi
exit 0
"""
