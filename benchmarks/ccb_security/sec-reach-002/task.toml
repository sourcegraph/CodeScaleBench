[task]
task_id = "sec-reach-002"
category = "reachability"
language = "cpp"
difficulty = "hard"
time_limit_sec = 1200
repo_url = "https://github.com/envoyproxy/envoy"

[task.description]
summary = "Trace attack path in Envoy with UNREACHABLE vulnerability"
details = """
Assess whether a theoretically vulnerable function in Envoy's HTTP header processing is reachable
from external HTTP input. The function contains unsafe buffer operations, but may be protected by
upstream validation. Determine exploitability and trace the complete call path.
"""

[task.scoring]
verifier = "tests/test.sh"
type = "weighted_checklist"
max_score = 1.0

[task.output]
format = "markdown"
path = "/logs/agent/triage.md"
