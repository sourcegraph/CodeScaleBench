version = "1.0"
[metadata]
name = "sgt-010"
description = "cuDNN dispatching heuristics rely on versions checks but currently only that compile-time version is"
license = "MIT"

[task]
id = "sgt-010"
repo = "pytorch"
category = "cross_module_bug_fix"
language = "cpp"
pre_fix_rev = "5811a8d7da873dd699ff6687092c225caffcf1bb"
ground_truth_rev = "b002562550577a09038c40c0e04ae18a54c8f12b"
difficulty = "hard"
time_limit_sec = 600

[verification]
type = "test"
command = "bash /workspace/tests/test.sh"

[environment]
build_timeout_sec = 1800.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
# Setup Sourcegraph MCP if credentials provided
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude
  
  cat > /root/.config/claude/mcp.json << 'EOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
EOF
  
  echo "âœ“ MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
